{{ define "body" }}
<div class="crt-overlay"></div>

<!-- Top Status Bar -->
<header class="terminal-status-bar">
    <div class="status-left">
        <span class="status-dot"></span>
        <span class="status-title">SYSTEM ONLINE</span>
        <span class="status-sub">| Otavio Coelho — Founder & CEO @ ONSTOQ</span>
    </div>
    <div class="status-right">
        <span class="status-sub">SÃO PAULO, BR</span>
    </div>
</header>

<!-- Quick Action Chips -->
<nav class="chips-container" aria-label="Terminal Quick Commands">
    <button class="chip-button" data-cmd="whois">👤 whois</button>
    <button class="chip-button" data-cmd="onstoq">🚀 onstoq</button>
    <button class="chip-button" data-cmd="projects">💻 projects</button>
    <button class="chip-button" data-cmd="vision">👁️ vision</button>
    <button class="chip-button" data-cmd="work">💼 work</button>
    <button class="chip-button" data-cmd="skills">⚡ skills</button>
    <button class="chip-button" data-cmd="theme">🎨 theme</button>
    <button class="chip-button" data-cmd="help">❓ help</button>
    <button class="chip-button" data-cmd="clear">🧹 clear</button>
</nav>

<!-- Main Terminal Area -->
<main class="terminal-container" id="terminal-wrapper"></main>

<!-- Bottom Footer Shortcut Bar -->
<footer class="terminal-footer-bar">
    <div>
        <span class="shortcut-key">TAB</span> Autocomplete &nbsp;|&nbsp; 
        <span class="shortcut-key">↑ / ↓</span> Command History
    </div>
    <div>
        Type <span class="shortcut-key">help</span> for all commands
    </div>
</footer>

<script>
jQuery(document).ready(function($) {
    var animation = false;
    var currentTheme = localStorage.getItem('term_theme') || 'matrix';
    
    // Apply saved theme
    if (currentTheme !== 'matrix') {
        document.documentElement.setAttribute('data-theme', currentTheme);
    }

    var availableCommands = [
        "all", "whois", "onstoq", 'social', 'work', 'education',
        'skills', 'softskills', 'languages', 'projects',
        'theme', 'clear',
        {{ if .Site.Params.certifications }} 'certifications', {{ end }}
        {{ if .Site.Params.startxLocation }} 'startx', {{ end }}
        {{ if .Site.Params.exitLocation }} 'exit', {{ end }}
        {{ if .Site.Params.misc }} '{{ .Site.Params.misc.commandName | default "misc"}}', {{ end }}
        {{ if not .Site.Params.hideSource }} 'source' {{ end }}
    ];

    function parse(val) {
        return val ? JSON.parse(val) : '';
    }

    function scrollToBottom() {
        var wrapper = document.getElementById('terminal-wrapper');
        if (wrapper) {
            wrapper.scrollTop = wrapper.scrollHeight;
        }
    }

    // Auto-scroll MutationObserver to ensure prompt is NEVER cut off or hidden below fold
    if (window.MutationObserver) {
        var observer = new MutationObserver(function() {
            scrollToBottom();
        });
        var target = document.getElementById('terminal-wrapper');
        if (target) {
            observer.observe(target, { childList: true, subtree: true, characterData: true });
        }
    }

    var termInstance = $('#terminal-wrapper').terminal(function(command, term) {

        // Helper function for typing roll-up effect per command block
        function rolledEcho(lines, options) {
            var text = Array.isArray(lines) ? lines.join('\n') : lines;
            var opts = Object.assign({ 
                typing: true, 
                delay: 4,
                onTyped: function() {
                    scrollToBottom();
                }
            }, options || {});
            
            // Return promise so terminal handles async completion cleanly
            return term.echo(text, opts);
        }

        /* Command Functions */
        function whois () {
            var lines = [""];
            {{ with .Site.Params.whois }} 
                lines.push("[[b;grey;]Name:]\t\t\t" + parse({{ .name | jsonify }}));
                lines.push("[[b;grey;]Profession:]\t\t" + parse({{ .profession | jsonify }}));
                lines.push("[[b;grey;]Location:]\t\t" + parse({{ .location | jsonify }}));
                {{ if .email }}
                    lines.push("[[b;grey;]Email:]\t\t\t" + parse({{ .email | jsonify }}));
                {{ end }}
                {{ if .homelink }}
                    lines.push("[[b;grey;]Homepage:]\t\t" + parse({{ .homelink | jsonify }}));
                {{ end }}
                {{ if .description }}
                    lines.push("");
                    lines.push(parse({{ .description | jsonify }}));
                {{ end }}
            {{ end }}
            lines.push("");
            return rolledEcho(lines);
        }

        function onstoq () {
            var lines = [
                "",
                "[[b;cyan;]🚀 ONSTOQ — B2B Procurement AI Platform]",
                "[[b;grey;]Role:]\t\tFounder & CEO",
                "[[b;grey;]Mission:]\tModernizing B2B procurement in construction & industrial supply chains.",
                "[[b;grey;]Technology:]\tLLM technical quotes, NCM AI classification, WhatsApp concierge GTM.",
                "[[b;grey;]Backing:]\tRaised $125,000 from Antler Brasil.",
                "[[b;grey;]Website:]\thttps://onstoq.com",
                ""
            ];
            return rolledEcho(lines);
        }

        function social () {
            var lines = [""];
            {{ if .Site.Params.hideSocialName }}
                {{ with .Site.Params.social }}
                    {{ range . }} 
                        lines.push(parse({{ .url | jsonify }}));
                    {{ end }}
                {{ end }}
            {{ else }}
                {{ with .Site.Params.social }}
                    {{ range . }}
                        lines.push(parse({{ .name | jsonify }}) + ": " + parse({{ .url | jsonify }}));
                    {{ end }}
                {{ end }}
            {{ end }}
            lines.push("");
            return rolledEcho(lines);
        }
            
        function certifications () {
            var lines = [""];
            {{ with .Site.Params.certifications }}
                {{ range . }}
                    lines.push("[[b;" + ({{ .color | jsonify }} ? parse({{ .color | jsonify }}) : "grey") + ";]" + parse({{ .certName | jsonify }}) + "]");
                    lines.push(parse({{ .date | jsonify }}));
                    {{ if .company }}
                        lines.push(parse({{ .company | jsonify }}));
                    {{ end }}
                    {{ if .description }}
                        lines.push(parse({{ .description | jsonify }}));
                    {{ end }}
                    lines.push("-------------------- ");
                    lines.push("");
                {{ end }}
            {{ end }}
            return rolledEcho(lines);
        }
            
        function work () {
            var lines = [""];
            {{ with .Site.Params.work }}
                {{ range . }}
                    lines.push("[[b;" + ({{ .color | jsonify }} ? parse({{ .color | jsonify }}) : "grey") + ";]" + parse({{ .jobTitle | jsonify }}) + "]");
                    lines.push(parse({{ .company | jsonify }}));
                    {{ if .location }}lines.push(parse({{ .location | jsonify }}));{{ end }}
                    lines.push(parse({{ .date | jsonify }}));
                    lines.push("");
                    lines.push(parse({{ .description | jsonify }}));
                    lines.push("-------------------- ");
                    lines.push("");
                {{ end }}
            {{ end }}
            return rolledEcho(lines);
        }

        function education () {
            var lines = [""];
            {{ with .Site.Params.education }}
                {{ range . }}
                    lines.push("[[b;" + ({{ .color | jsonify }} ? parse({{ .color | jsonify }}) : "grey") + ";]" + parse({{ .courseName | jsonify }}) + "]");
                    lines.push(parse({{ .date | jsonify }}));
                    {{ if .description }}
                        lines.push(parse({{ .description | jsonify }}));
                    {{ end }}
                    lines.push("-------------------- ");
                    lines.push("");
                {{ end }}
            {{ end }}
            return rolledEcho(lines);
        }

        function skills () {
            var lines = [""];
            {{ with .Site.Params.skills }}
                {{ range . }}
                    var bar_length = Math.round({{ .percentage }} / 10);
                    var bar_filled = Array(bar_length + 1).join("&#9611;");
                    var bar_blank= Array(11 - bar_length).join("&#9617;");
                    lines.push("[[b;" + ({{ .color | jsonify }} ? parse({{ .color | jsonify }}) : "grey") + ";]" + parse({{ .name | jsonify }}) + ":]\n" +
                            bar_filled + bar_blank + " " +
                            {{ .percentage }} +"%");
                    {{ if .description }}
                        lines.push(parse({{ .description | jsonify }}));
                    {{ end }}
                    lines.push("");
                {{ end }}
            {{ end }}
            return rolledEcho(lines);
        }

        function softskills () {
            var lines = [""];
            {{ with .Site.Params.softskills }}
                {{ range . }}
                    var bar_length = Math.round({{ .percentage }} / 10);
                    var bar_filled = Array(bar_length + 1).join("&#9611;");
                    var bar_blank= Array(11 - bar_length).join("&#9617;");
                    lines.push("[[b;" + ({{ .color | jsonify }} ? parse({{ .color | jsonify }}) : "grey") + ";]" + parse({{ .name | jsonify }}) + ":]\n" +
                           bar_filled + bar_blank + " " +
                           {{ .percentage }} +"%");
                    {{ if .description }}
                        lines.push(parse({{ .description | jsonify }}));
                    {{ end }}
                    lines.push("");
                {{ end }}
            {{ end }}
            return rolledEcho(lines);
        }
          
        function languages () {
            var lines = [""];
            {{ with .Site.Params.languages }}
                {{ range . }}
                    var bar_length = Math.round({{ .percentage }} / 10);
                    var bar_filled = Array(bar_length + 1).join("&#9611;");
                    var bar_blank= Array(11 - bar_length).join("&#9617;");
                    lines.push("[[b;" + ({{ .color | jsonify }} ? parse({{ .color | jsonify }}) : "grey") + ";]" + parse({{ .name | jsonify }}) + ":]\n" +
                            "" + bar_filled + bar_blank + 
                            " " + {{ .percentage }} +"%");
                    {{ if .description }}
                        lines.push(parse({{ .description | jsonify }}));
                    {{ end }}
                    lines.push("");
                {{ end }}
            {{ end }}
            return rolledEcho(lines);
        }

        function projects () {
            var lines = [""];
            {{ with .Site.Params.projects }}
                {{ range . }}
                    lines.push("[[b;" + ({{ .color | jsonify }} ? parse({{ .color | jsonify }}) : "grey") + ";]" + parse({{ .title | jsonify }}) + "]");
                    lines.push(parse({{ .date | jsonify }}));
                    {{ if .link }}lines.push(parse({{ .link | jsonify }}));{{ end }}
                    {{ if .description }}
                        lines.push(parse({{ .description | jsonify }}));
                    {{ end }}
                    lines.push("-----------------------");
                    lines.push("");
                {{ end }}
            {{ end }}
            return rolledEcho(lines);
        }

        function misc () {
            var lines = [
                "",
                "[[b;" + ({{ .Site.Params.misc.titleColor | jsonify }} ? parse({{ .Site.Params.misc.titleColor | jsonify }}) : "teal") + ";]" + parse({{ .Site.Params.misc.title | jsonify }}) + "]\n",
                "[[;" + ({{ .Site.Params.misc.contentColor | jsonify }} ? parse({{ .Site.Params.misc.contentColor | jsonify }}) : "orange") + ";]" + parse({{ .Site.Params.misc.content | jsonify }}) + "]",
                ""
            ];
            return rolledEcho(lines);
        }

        function themeCommand (arg) {
            var validThemes = ['matrix', 'dracula', 'amber', 'mono'];
            if (!arg) {
                return rolledEcho([
                    "",
                    "[[b;cyan;]Available themes:] " + validThemes.join(' | '),
                    "Usage: theme <name> (e.g. 'theme dracula')",
                    ""
                ]);
            } else if (validThemes.indexOf(arg.toLowerCase()) !== -1) {
                var selected = arg.toLowerCase();
                if (selected === 'matrix') {
                    document.documentElement.removeAttribute('data-theme');
                } else {
                    document.documentElement.setAttribute('data-theme', selected);
                }
                localStorage.setItem('term_theme', selected);
                return rolledEcho(["", "[[b;green;]Theme switched to:] " + selected, ""]);
            } else {
                return rolledEcho(["", "[[b;red;]Unknown theme:] " + arg + ". Choose from: " + validThemes.join(', '), ""]);
            }
        }

        function help () {
            return rolledEcho([
                "",
                "[[b;white;]Available commands:]",
                "",
                availableCommands.join(' '),
                ""
            ]);
        }

        function source() {
            return rolledEcho([
                "        _______            ",
                "       |       |           ",
                "       |       |           ",
                "       |_______|_______    ",
                "               |_______|_______    ",
                "               |       |   ",
                " ______________|_______|   ",
                "|      |       |       |   ",
                "|      |       |       |   ",
                "|______|_______|_______|   ",
                "[[;red;]May the source be with you]",
                "[[;grey;]https://github.com/4s3ti/terminalcv",
                ""
            ]);
        }

        function progress(percent, width) {
            var size = Math.round(width*percent/100);
            var left = '', taken = '', i;
            for (i=size; i--;) {
                taken += '=';
            }
            if (taken.length > 0) {
                taken = taken.replace(/=$/, '>');
            }
            for (i=width-size; i--;) {
                left += ' ';
            }
            return '[' + taken + left + '] ' + percent + '%';
        }

        function loading () {
            var i = 0, size = 30;
            prompt = term.get_prompt();
            string = progress(0, size);
            term.set_prompt(progress);
            animation = true;
            (function loop() {
                string = progress(i++, size);
                term.set_prompt(string);
                if (i < 100) {
                    timer = setTimeout(loop, 10);
                } else {
                    term.echo(progress(i, size) + ' [[b;green;]OK]').set_prompt(prompt);
                    animation = false;
                }
            })();
        }

        /* Command Switch Router */
        commands = command.trim().split(/[ ]+/);
        switch(commands[0]) {
            case 'whois':
                return whois();
            case 'onstoq':
                return onstoq();
            case 'social':
                return social();
            case 'work':
                return work();
            case 'education':
                return education();
            case 'skills':
                return skills();
            case 'softskills':
                return softskills();
            case 'languages':
                return languages();
            case 'projects':
                return projects();
            case 'certifications':
                return certifications();
            case '{{ .Site.Params.misc.commandName | default "misc"}}':
                return misc();
            case 'theme':
                return themeCommand(commands[1]);
            case 'clear':
                term.clear();
                scrollToBottom();
                break;
            case 'help':
                return help();
            case 'all':
                var allLines = [];
                whois();
                onstoq();
                social();
                work();
                education();
                skills();
                softskills();
                languages();
                projects();
                certifications();
                {{ if .Site.Params.misc }}
                    misc();
                {{ end }}
                {{ if not .Site.Params.hideSource }}
                    source();
                {{ end }}
                break;
            {{ if .Site.Params.startxLocation }}
            case 'startx':
                term.echo("loading ...")
                loading();
                setTimeout(function(){window.location = parse({{ .Site.Params.startxLocation | jsonify }})}, 2000);
                break;
            {{ end }}
            case ':(){:|:&};:':
            case 'source':
                return source();
            {{ if .Site.Params.exitLocation }}
            case 'exit':
                term.echo("terminating ... ")
                loading();
                setTimeout(function(){window.location = parse({{ .Site.Params.exitLocation | jsonify }})}, 2000);
                break;
            {{ end }}
            case '':
                break;
            default:
                return rolledEcho([
                    "",
                    "unknown command: " + command,
                    "please type 'help' for a list of available commands",
                    ""
                ]);
        }
    }, {
        prompt: "[[;" + ({{ .Site.Params.promptColor | jsonify }} ? parse({{ .Site.Params.promptColor | jsonify }}) : "green") + ";]" + parse({{ .Site.Params.prompt | default "guest@otaviocoelho" | jsonify }}) + "]" + "[[;" + ({{ .Site.Params.promptSimbolsColor | jsonify }} ? parse({{ .Site.Params.promptSimbolsColor | jsonify }}) : "green") + ";]" + parse({{ .Site.Params.promptSimbols | default "$" | jsonify }}) + "] ",
        greetings: "[[b;" + ({{ .Site.Params.greetingColor | jsonify }} ? parse({{ .Site.Params.greetingColor | jsonify }}) : "white") + ";]" + parse({{ .Site.Params.greeting | jsonify }}) + "]",
        keydown: function(e, term) {
            if (animation) {
                if (e.which == 68 && e.ctrlKey) { // CTRL+D
                    clearTimeout(timer);
                    animation = false;
                    term.echo(string + ' [[b;red;]FAIL]')
                    .set_prompt(prompt);
                }
                return false;
            }
        },
        autocompleteMenu: true,
        completion: availableCommands
    });

    // Wire Chip Buttons
    $('.chip-button').on('click', function(e) {
        e.preventDefault();
        var cmd = $(this).data('cmd');
        if (termInstance.paused()) {
            termInstance.resume();
        }
        if (cmd === 'clear') {
            termInstance.clear();
            scrollToBottom();
        } else {
            termInstance.exec(cmd);
        }
        termInstance.focus();
        scrollToBottom();
    });
});
</script>
{{ end }}
